<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <!-- Configurações básicas da página -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro - Viaje Mais</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Conteúdo principal -->
<main class="container py-5">

    <!-- Linha centralizada -->
    <section class="row justify-content-center">

        <!-- Coluna responsiva -->
        <article class="col-md-6 col-lg-5">

            <!-- Card do formulário -->
            <div class="card shadow">

                <div class="card-body">

                    <!-- Título -->
                    <h2 class="text-center mb-4">
                        Criar Conta
                    </h2>

                    <!-- Formulário de cadastro -->
                    <form id="formCadastro">

                        <!-- Campo Nome -->
                        <div class="mb-3">
                            <label class="form-label">
                                Nome
                            </label>

                            <input
                                    type="text"
                                    id="cadastroNome"
                                    class="form-control"
                                    required>
                        </div>

                        <!-- Campo Email -->
                        <div class="mb-3">
                            <label class="form-label">
                                Email
                            </label>

                            <input
                                    type="email"
                                    id="cadastroEmail"
                                    class="form-control"
                                    required>
                        </div>

                        <!-- Campo Senha -->
                        <div class="mb-3">
                            <label class="form-label">
                                Senha
                            </label>

                            <input
                                    type="password"
                                    id="cadastroSenha"
                                    class="form-control"
                                    minlength="6"
                                    required>
                        </div>

                        <!-- Botão cadastrar -->
                        <button
                                type="submit"
                                class="btn btn-primary w-100">

                            Cadastrar

                        </button>

                    </form>

                    <!-- Link para login -->
                    <div class="text-center mt-3">

                        Já possui conta?

                        <a href="Login.html">
                            Fazer Login
                        </a>

                    </div>

                </div>

            </div>

        </article>

    </section>

</main>

<!-- Arquivo JavaScript -->
<script src="../script.js"></script>

</body>

</html>
