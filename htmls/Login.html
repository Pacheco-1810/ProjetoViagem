<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <!-- Configurações da página -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Viaje Mais</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Conteúdo principal -->
<main class="container py-5">

    <!-- Linha centralizada -->
    <section class="row justify-content-center">

        <!-- Coluna responsiva -->
        <article class="col-md-6 col-lg-5">

            <!-- Card de login -->
            <div class="card shadow">

                <div class="card-body">

                    <!-- Título -->
                    <h2 class="text-center mb-4">
                        Login
                    </h2>

                    <!-- Formulário -->
                    <form id="formLogin">

                        <!-- Campo Email -->
                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input
                                    type="email"
                                    id="loginEmail"
                                    class="form-control"
                                    required>

                        </div>

                        <!-- Campo Senha -->
                        <div class="mb-3">

                            <label class="form-label">
                                Senha
                            </label>

                            <input
                                    type="password"
                                    id="loginSenha"
                                    class="form-control"
                                    required>

                        </div>

                        <!-- Botão Entrar -->
                        <button
                                type="submit"
                                class="btn btn-success w-100">

                            Entrar

                        </button>

                    </form>

                    <!-- Link para cadastro -->
                    <div class="text-center mt-3">

                        Não possui conta?

                        <a href="Cadastro.html">
                            Cadastre-se
                        </a>

                    </div>

                </div>

            </div>

        </article>

    </section>

</main>

<!-- Arquivo JavaScript -->
<script src="../script.js"></script>

</body>

</html>
